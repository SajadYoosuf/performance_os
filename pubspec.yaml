name: app
description: "AI-Powered Personal Performance Operating System"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.7.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  # Firebase
  firebase_core: ^4.5.0
  firebase_auth: ^6.0.0
  cloud_firestore: ^6.0.0
  # State Management
  provider: ^6.1.2
  # Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  # Utils
  intl: ^0.20.2
  equatable: ^2.0.7
  uuid: ^4.5.1
  google_fonts: ^6.2.1
  # Speech & Notifications
  speech_to_text: ^7.0.0
  flutter_local_notifications: ^18.0.1
  # Asset Generation
  flutter_gen: ^5.8.0
  # Generative UI (Core)
  genui: ^0.7.0
  genui_firebase_ai: ^0.7.0
  json_schema_builder: ^0.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.14
  flutter_gen_runner: ^5.8.0

flutter_gen:
  output: lib/gen/
  line_length: 80
  integrations:
    flutter_svg: false
    flare_flutter: false
    rive: false
    lottie: false

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
